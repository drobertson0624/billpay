// Tiny Supabase REST client — no SDK needed
const sb = {
  async select(table, filters={}) {
    let url = `${SUPABASE_URL}/rest/v1/${table}?select=*`;
    Object.entries(filters).forEach(([k,v]) => url += `&${k}=eq.${encodeURIComponent(v)}`);
    const r = await fetch(url, { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" } });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async upsert(table, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: "POST",
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", Prefer: "resolution=merge-duplicates,return=representation" },
      body: JSON.stringify(Array.isArray(data) ? data : [data])
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async delete(table, id) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, {
      method: "DELETE",
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" }
    });
    if (!r.ok) throw new Error(await r.text());
  },
  // Real-time via Supabase Realtime WebSocket
  subscribe(table, callback) {
    const wsUrl = `${SUPABASE_URL.replace("https","wss")}/realtime/v1/websocket?apikey=${SUPABASE_KEY}&vsn=1.0.0`;
    const ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      ws.send(JSON.stringify({ topic:`realtime:public:${table}`, event:"phx_join", payload:{config:{broadcast:{self:true},presence:{key:""}}}, ref:"1" }));
    };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.event === "INSERT" || msg.event === "UPDATE" || msg.event === "DELETE") callback(msg);
    };
    return () => ws.close();
  }
};

// Convert flat DB row → app month object (with bills array)
function rowsToMonths(monthRows, billRows) {
  return monthRows.map(m => ({
    id: m.id, year: m.year, month: m.month, label: m.label,
    status: m.status, startingBalance: m.starting_balance,
    balance: m.balance, closedAt: m.closed_at ? new Date(m.closed_at).getTime() : null,
    bills: billRows.filter(b => b.month_id === m.id).map(b => ({
      id: b.id, vendorId: b.vendor_id, vendorName: b.vendor_name,
      amount: b.amount, status: b.status, account: b.account,
      dueDate: b.due_date, note: b.note || "",
      paidAt: b.paid_at ? new Date(b.paid_at).getTime() : null
    }))
  }));
}

function monthToRow(m, propKey) {
  return { id:m.id, prop_key:propKey, year:m.year, month:m.month, label:m.label,
           status:m.status, starting_balance:m.startingBalance||0, balance:m.balance||0,
           closed_at: m.closedAt ? new Date(m.closedAt).toISOString() : null };
}

function billToRow(b, monthId) {
  return { id:b.id, month_id:monthId, vendor_id:b.vendorId, vendor_name:b.vendorName,
           amount:b.amount||0, status:b.status, account:b.account||"",
           due_date:b.dueDate||"", note:b.note||"",
           paid_at: b.paidAt ? new Date(b.paidAt).toISOString() : null };
}

function vendorToRow(v, propKey) {
  return { id:v.id, prop_key:propKey, name:v.name, category:v.category||"",
           account:v.account||"", default_amount:v.defaultAmount||0,
           due_date:v.dueDate||"", notes:v.notes||"", url:v.url||"", phone:v.phone||"" };
}

function rowToVendor(r) {
  return { id:r.id, name:r.name, category:r.category, account:r.account,
           defaultAmount:r.default_amount, dueDate:r.due_date,
           notes:r.notes, url:r.url, phone:r.phone };
}

// ─── useSupabaseData — loads + syncs months/bills/vendors from Supabase ───────
function useSupabaseData(propKey, seedVendors, seedMonths) {
  const [months,  setMonths]  = useState(seedMonths);
  const [vendors, setVendors] = useState(seedVendors);
  const [synced,  setSynced]  = useState(false);
  const [error,   setError]   = useState(null);

  // Initial load
  useEffect(() => {
    let cancelled = false;
    async function load() {
      try {
        const [mRows, bRows, vRows] = await Promise.all([
          sb.select("months",  { prop_key: propKey }),
          sb.select("bills"),
          sb.select("vendors", { prop_key: propKey }),
        ]);
        if (cancelled) return;

        // If no months in DB yet, seed from local data
        if (mRows.length === 0) {
          await seedToSupabase(propKey, seedMonths, seedVendors);
          const [mRows2, bRows2, vRows2] = await Promise.all([
            sb.select("months",  { prop_key: propKey }),
            sb.select("bills"),
            sb.select("vendors", { prop_key: propKey }),
          ]);
          if (!cancelled) {
            setMonths(rowsToMonths(mRows2, bRows2));
            setVendors(vRows2.length > 0 ? vRows2.map(rowToVendor) : seedVendors);
          }
        } else {
          setMonths(rowsToMonths(mRows, bRows));
          setVendors(vRows.length > 0 ? vRows.map(rowToVendor) : seedVendors);
        }
        setSynced(true);
      } catch(e) {
        console.error("Supabase load error:", e);
        setError(e.message);
        setSynced(true); // fall through to local data
      }
    }
    load();

    // Real-time subscription
    const unsub1 = sb.subscribe("months", () => load());
    const unsub2 = sb.subscribe("bills",  () => load());

    return () => { cancelled = true; unsub1(); unsub2(); };
  }, [propKey]);

  // Save a month + all its bills to Supabase
  async function saveMonth(month) {
    try {
      await sb.upsert("months", monthToRow(month, propKey));
      if (month.bills && month.bills.length > 0) {
        await sb.upsert("bills", month.bills.map(b => billToRow(b, month.id)));
      }
    } catch(e) { console.error("Save month error:", e); }
  }

  // Update a month locally + sync to Supabase
  function updateMonth(id, fn) {
    setMonths(prev => {
      const updated = prev.map(m => m.id === id ? {...m, ...fn(m)} : m);
      const changed = updated.find(m => m.id === id);
      if (changed) saveMonth(changed);
      return updated;
    });
  }

  // Add a new month
  async function addMonth(nm) {
    setMonths(prev => [...prev, nm]);
    await saveMonth(nm);
  }

  // Delete a month
  async function deleteMonth(id) {
    setMonths(prev => prev.filter(m => m.id !== id));
    try { await sb.delete("months", id); } catch(e) { console.error(e); }
  }

  // Save vendors
  async function saveVendors(vList) {
    setVendors(vList);
    try {
      await sb.upsert("vendors", vList.map(v => vendorToRow(v, propKey)));
    } catch(e) { console.error("Save vendors error:", e); }
  }

  return { months, vendors, synced, error, updateMonth, addMonth, deleteMonth, saveVendors };
}

async function seedToSupabase(propKey, seedMonths, seedVendors) {
  try {
    await sb.upsert("vendors", seedVendors.map(v => vendorToRow(v, propKey)));
    for (const m of seedMonths) {
      await sb.upsert("months", monthToRow(m, propKey));
      if (m.bills && m.bills.length > 0) {
        await sb.upsert("bills", m.bills.map(b => billToRow(b, m.id)));
      }
    }
  } catch(e) { console.error("Seed error:", e); }
}

const GOOGLE_CLIENT_ID = "1003372732048-d29pha2o6s7e7mpma6jc0mstepsh351r.apps.googleusercontent.com";

function useAuth() {
  const [user,    setUser]    = useState(null);   // { email, name, picture }
  const [status,  setStatus]  = useState("loading"); // loading | checking | allowed | denied | signedout

  useEffect(() => {
    // Load Google Identity Services script
    if (!window.google) {
      const s = document.createElement("script");
      s.src = "https://accounts.google.com/gsi/client";
      s.async = true;
      s.onload = () => setStatus("signedout");
      document.head.appendChild(s);
    } else {
      setStatus("signedout");
    }
  }, []);

  async function signIn(credential) {
    // Decode JWT to get user info
    const payload = JSON.parse(atob(credential.split(".")[1]));
    const email   = payload.email;
    const name    = payload.name;
    const picture = payload.picture;

    setStatus("checking");
    try {
      // Check allowlist
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/allowed_users?email=eq.${encodeURIComponent(email)}&select=email`,
        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
      );
      const rows = await res.json();
      if (rows && rows.length > 0) {
        setUser({ email, name, picture });
        setStatus("allowed");
        localStorage.setItem("bp_user", JSON.stringify({ email, name, picture }));
      } else {
        setStatus("denied");
      }
    } catch(e) {
      console.error(e);
      setStatus("denied");
    }
  }

  function signOut() {
    setUser(null);
    setStatus("signedout");
    localStorage.removeItem("bp_user");
    if (window.google) window.google.accounts.id.disableAutoSelect();
  }

  // Restore session from localStorage
  useEffect(() => {
    if (status === "signedout") {
      const saved = localStorage.getItem("bp_user");
      if (saved) {
        try {
          const u = JSON.parse(saved);
          // Re-verify against allowlist
          fetch(`${SUPABASE_URL}/rest/v1/allowed_users?email=eq.${encodeURIComponent(u.email)}&select=email`,
            { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } })
            .then(r => r.json())
            .then(rows => {
              if (rows && rows.length > 0) { setUser(u); setStatus("allowed"); }
            }).catch(() => {});
        } catch(e) {}
      }
    }
  }, [status]);

  return { user, status, signIn, signOut };
}

// ─── Responsive hook ─────────────────────────────────────────────────────────
function useIsMobile() {
  const [isMobile, setIsMobile] = useState(() => window.innerWidth < 768);
  useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);
  return isMobile;
}

function App(){
  const { user, status, signIn, signOut } = useAuth();

  // Loading state — checking session
  if (status === "loading" || status === "checking") return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#5a3d80,#7F58AF)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>

    <div style={{fontFamily:"'Nunito','-apple-system',system-ui,sans-serif"}}>
      <style>{CSS}</style>

              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,0.5)" strokeWidth="2.5" strokeLinecap="round">

              {navItems.map(item=>{

                    <div style={{width:32,height:32,borderRadius:8,background:isActive?(item.accent||"#7F58AF"):"rgba(0,0,0,0.06)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"}}>
                      {item.icon==="grid" && <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={isActive?"#fff":"rgba(0,0,0,0.45)"} strokeWidth="2" strokeLinecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>}
                      {item.icon==="home" && <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={isActive?"#fff":"rgba(0,0,0,0.45)"} strokeWidth="2" strokeLinecap="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>}
                      {item.icon==="leaf" && <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={isActive?"#fff":"rgba(0,0,0,0.45)"} strokeWidth="2" strokeLinecap="round"><path d="M12 2C6 2 3 7 3 12c0 4 2.5 7.5 7 9l2-3"/><path d="M12 2c6 0 9 5 9 10 0 4-2.5 7.5-7 9l-2-3"/><line x1="12" y1="21" x2="12" y2="9"/></svg>}
                    </div>
                    <span style={{fontSize:15,fontWeight:isActive?700:500,color:isActive?"#1C1C1E":"rgba(0,0,0,0.55)",flex:1}}>{item.label}</span>
                    {item.badge>0 && <span style={{background:"#E84D8A",color:"#fff",borderRadius:10,padding:"2px 8px",fontSize:12,fontWeight:700}}>{item.badge}</span>}
                  </button>
                );
              })}
            </div>

            {/* User + sign out */}
            <div style={{padding:"16px 16px 48px",borderTop:"1px solid rgba(0,0,0,0.06)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                {user?.picture
                  ? <img src={user.picture} style={{width:36,height:36,borderRadius:18,flexShrink:0}} alt=""/>
                  : <div style={{width:36,height:36,borderRadius:18,background:"#7F58AF",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14,fontWeight:700,flexShrink:0}}>{user?.name?.[0]||"?"}</div>
                }
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#1C1C1E",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user?.name||"User"}</div>
                  <div style={{fontSize:11,color:"rgba(0,0,0,0.35)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user?.email||""}</div>
                </div>
                <button onClick={onSignOut}
                  style={{background:"rgba(232,77,138,0.1)",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,color:"#E84D8A",cursor:"pointer",fontFamily:"inherit"}}>
                  Sign out
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── Page content with hamburger in hero ── */}
      {!prop && <MobileDashboard onSelect={setProp} user={user} onSignOut={onSignOut} onMenu={()=>setDrawerOpen(true)}/>}
      {prop==="sw"   && <PropAppWithMenu pk="sw"   onBack={()=>setProp(null)} onMenu={()=>setDrawerOpen(true)}/>}
      {prop==="snap" && <PropAppWithMenu pk="snap" onBack={()=>setProp(null)} onMenu={()=>setDrawerOpen(true)}/>}
    </div>
  );
}

// PropApp wrapper that adds hamburger menu button
function PropAppWithMenu({pk, onBack, onMenu}){
  return(
    <div style={{position:"relative"}}>
      {/* Floating hamburger */}
      <button onClick={onMenu}
        style={{position:"fixed",top:16,left:16,zIndex:100,width:36,height:36,borderRadius:10,background:"rgba(255,255,255,0.9)",backdropFilter:"blur(10px)",border:"1px solid rgba(0,0,0,0.08)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.1)"}}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,0.6)" strokeWidth="2.5" strokeLinecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <PropApp pk={pk} onBack={onBack}/>
    </div>
  );
}

// ─── Mobile Dashboard ─────────────────────────────────────────────────────────
function MobileDashboard({onSelect, user, onSignOut, onMenu}){
  const swM = readStore("bp_months_sw",   SW_MONTHS);
  const snM = readStore("bp_months_snap", SNAP_MONTHS);
  const { ytd, thisMonthSpend, lastMonthSpend, spendDelta, pendingBills,
          largest, totalBalance, totalPending, health, swStats, snStats, monthHistory } = calcDashStats(swM, snM);
  const hc  = healthConfig(health);
  const now = new Date();
  const greeting = now.getHours()<12?"Good morning":now.getHours()<17?"Good afternoon":"Good evening";

  const insights=[];
  if(pendingBills.length>0) insights.push({icon:"📋",text:`You have ${pendingBills.length} bill${pendingBills.length>1?"s":""} still pending this month.`});
  if(spendDelta!==null&&Math.abs(spendDelta)>=5) insights.push({icon:spendDelta>0?"📈":"📉",text:spendDelta>0?`Spending is up ${Math.abs(spendDelta).toFixed(0)}% vs last month.`:`Spending is down ${Math.abs(spendDelta).toFixed(0)}% vs last month.`});
  if(largest) insights.push({icon:"💡",text:`Largest expense: ${largest.vendorName} at ${fmt(largest.amount)}.`});
  if(insights.length===0) insights.push({icon:"✅",text:"All caught up. Balance looks healthy."});

  return(
    <div style={{minHeight:"100vh",background:"#f7f7f7",paddingBottom:48}}>
      {/* Hero */}
      <div style={{background:"linear-gradient(160deg,#5a3d80 0%,#7F58AF 100%)",padding:"52px 22px 28px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 80% 20%,rgba(100,197,235,0.3),transparent 60%)",pointerEvents:"none"}}/>
        <div style={{position:"relative"}}>
          {/* Top bar: hamburger + greeting + avatar */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <button onClick={onMenu}
              style={{width:36,height:36,borderRadius:10,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.2)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" strokeWidth="2.5" strokeLinecap="round">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
              </svg>
            </button>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.7)"}}>{greeting}, {user?.name?.split(" ")[0]||"David"}</div>
            {user?.picture
              ? <img src={user.picture} style={{width:32,height:32,borderRadius:16}} alt=""/>
              : <div style={{width:32,height:32,borderRadius:16,background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,fontWeight:700}}>{user?.name?.[0]||"?"}</div>
            }
          </div>
          <div style={{fontSize:28,fontWeight:800,color:"#ffffff",letterSpacing:"-0.5px",lineHeight:1.15,marginBottom:2}}>Home Workbook</div>
          <div style={{fontSize:14,color:"rgba(255,255,255,0.5)",marginBottom:24}}>{MO_SHORT[now.getMonth()]} {now.getFullYear()} · Financial Overview</div>
          {/* Stat pills */}
          <div style={{display:"flex",gap:10}}>
            {[
              {label:"This Month",val:fmt(thisMonthSpend),sub:spendDelta!==null?`${spendDelta>0?"↑":"↓"} ${Math.abs(spendDelta).toFixed(0)}%`:null,subColor:spendDelta>0?"#FEB326":"#64C5EB"},
              {label:"YTD Paid",val:fmt(ytd),sub:`Jan ${now.getFullYear()}`,subColor:"rgba(255,255,255,0.4)"},
              {label:"Balance",val:hc.label,sub:fmt(totalBalance),subColor:"rgba(255,255,255,0.4)",valColor:hc.color},
            ].map((s,i)=>(
              <div key={i} style={{flex:1,background:"rgba(255,255,255,0.08)",borderRadius:14,padding:"12px 10px",border:"1px solid rgba(255,255,255,0.1)"}}>
                <div style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>{s.label}</div>
                <div style={{fontSize:15,fontWeight:700,color:s.valColor||"#ffffff",letterSpacing:"-0.3px"}}>{s.val}</div>
                {s.sub&&<div style={{fontSize:10,marginTop:2,fontWeight:600,color:s.subColor}}>{s.sub}</div>}
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{padding:"20px 16px 0"}}>
        {/* Reminders widget */}
        <RemindersWidget/>

        {/* Advisor insights */}
        <div style={{background:"#ffffff",borderRadius:18,padding:"16px 18px",marginBottom:16,border:"1px solid rgba(0,0,0,0.07)",boxShadow:"0 2px 10px rgba(0,0,0,0.05)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <div style={{width:26,height:26,borderRadius:7,background:"linear-gradient(135deg,#5a3d80,#7F58AF)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>💼</div>
            <div style={{fontSize:13,fontWeight:700,color:"#1C1C1E"}}>Advisor Insights</div>
          </div>
          {insights.map((ins,i)=>(
            <div key={i} style={{display:"flex",gap:8,padding:"8px 0",borderTop:i>0?"1px solid rgba(0,0,0,0.05)":"none",alignItems:"flex-start"}}>
              <span style={{fontSize:14,flexShrink:0}}>{ins.icon}</span>
              <span style={{fontSize:13,color:"rgba(0,0,0,0.6)",lineHeight:1.45}}>{ins.text}</span>
            </div>
          ))}
        </div>

        {/* Bar chart */}
        <div style={{background:"#ffffff",borderRadius:18,padding:"16px 18px 12px",marginBottom:16,border:"1px solid rgba(0,0,0,0.07)",boxShadow:"0 2px 10px rgba(0,0,0,0.05)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:700,color:"#1C1C1E"}}>Monthly Spending</div>
            <div style={{fontSize:12,color:"rgba(0,0,0,0.38)"}}>6 months</div>
          </div>
          <SpendingBarChart data={monthHistory} currentMonth={now.getMonth()} currentYear={now.getFullYear()}/>
        </div>

        {/* Properties */}
        <div style={{fontSize:12,fontWeight:700,color:"rgba(0,0,0,0.38)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10,padding:"0 2px"}}>Properties</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
          {[{p:PROPERTIES.sw,st:swStats},{p:PROPERTIES.snap,st:snStats}].map(({p,st})=>(
            <div key={p.key} className="prop-card" onClick={()=>onSelect(p.key)}
              style={{background:"#ffffff",borderRadius:18,overflow:"hidden",cursor:"pointer",border:"1px solid rgba(0,0,0,0.07)",boxShadow:"0 2px 10px rgba(0,0,0,0.05)"}}>
              <div style={{background:`linear-gradient(140deg,${p.gradient[0]},${p.gradient[1]})`,padding:"14px 12px",position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",inset:0,background:`radial-gradient(circle at 80% 30%,${p.accent}30,transparent 70%)`,pointerEvents:"none"}}/>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",position:"relative"}}>
                  <div>
                    <div style={{fontSize:9,fontWeight:600,color:"rgba(255,255,255,0.5)",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:2}}>{p.sub}</div>
                    <div style={{fontSize:14,fontWeight:700,color:"#ffffff"}}>{p.label}</div>
                  </div>
                  <div style={{fontSize:18}}>{p.key==="sw"?<HomeIcon size={18}/>:<LeafIcon size={18}/>}</div>
                </div>
                <div style={{marginTop:10}}>
                  <div style={{height:3,background:"rgba(255,255,255,0.2)",borderRadius:2,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${st.pct}%`,background:p.accent,borderRadius:2}}/>
                  </div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginTop:3}}>{st.pct}% this month</div>
                </div>
              </div>
              <div style={{padding:"10px 12px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:10,color:"rgba(0,0,0,0.4)"}}>Remaining</span>
                  <span style={{fontSize:12,fontWeight:700,color:st.bal<0?"#E84D8A":p.accent}}>{fmt(st.bal)}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:10,color:"rgba(0,0,0,0.4)"}}>Pending</span>
                  <span style={{fontSize:12,fontWeight:600,color:st.pending>0?"#FEB326":"#64C5EB"}}>{st.pending>0?`${st.pending} bills`:"Clear ✓"}</span>
                </div>
              </div>
              <div style={{borderTop:"1px solid rgba(0,0,0,0.05)",padding:"8px 12px",display:"flex",justifyContent:"flex-end"}}>
                <span style={{fontSize:11,fontWeight:700,color:p.accent}}>Open →</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Desktop Shell ────────────────────────────────────────────────────────────
function DesktopShell({user, onSignOut}){
  const [panel,     setPanel]     = useState("dashboard");
  const [collapsed, setCollapsed] = useState(false);

  const swM  = readStore("bp_months_sw",  SW_MONTHS);
  const snM  = readStore("bp_months_snap",SNAP_MONTHS);
  const swPending = swM.filter(m=>m.status!=="closed").reduce((s,m)=>s+m.bills.filter(b=>b.status==="pending").length,0);
  const snPending = snM.filter(m=>m.status!=="closed").reduce((s,m)=>s+m.bills.filter(b=>b.status==="pending").length,0);

  const navItems = [
    { id:"dashboard", label:"Overview",    icon:"grid", badge:null },
    { id:"sw",        label:"Sir Walters", icon:"home", badge:swPending||null, accent:"#7F58AF" },
    { id:"snap",      label:"Snapdragon",  icon:"leaf", badge:snPending||null, accent:"#64C5EB" },
  ];

  // Hamburger icon SVG
  const MenuIcon = () => (
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,0.5)" strokeWidth="2.5" strokeLinecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  );

  const NavIcon = ({icon, active}) => {
    const stroke = active ? "#fff" : "rgba(0,0,0,0.45)";
    if (icon==="grid") return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth="2" strokeLinecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>;
    if (icon==="home") return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth="2" strokeLinecap="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>;
    if (icon==="leaf") return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth="2" strokeLinecap="round"><path d="M12 2C6 2 3 7 3 12c0 4 2.5 7.5 7 9l2-3"/><path d="M12 2c6 0 9 5 9 10 0 4-2.5 7.5-7 9l-2-3"/><line x1="12" y1="21" x2="12" y2="9"/></svg>;
    return null;
  };

  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>

      {/* ── Sidebar ── */}
      <div style={{
        width: collapsed ? 52 : 220,
        background:"rgba(245,245,250,0.97)",
        borderRight:"1px solid rgba(0,0,0,0.08)",
        display:"flex", flexDirection:"column",
        flexShrink:0,
        transition:"width 0.22s cubic-bezier(0.4,0,0.2,1)",
        overflow:"hidden"
      }}>

        {/* Top bar — toggle button + logo */}
        <div style={{
          display:"flex", alignItems:"center",
          padding: collapsed ? "18px 0 14px" : "18px 12px 14px",
          justifyContent: collapsed ? "center" : "flex-start",
          gap:10, flexShrink:0
        }}>
          <button onClick={()=>setCollapsed(c=>!c)}
            style={{width:32,height:32,borderRadius:8,background:"rgba(0,0,0,0.06)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <MenuIcon/>
          </button>
          {!collapsed && (
            <div style={{overflow:"hidden"}}>
              <div style={{fontSize:10,fontWeight:700,color:"rgba(0,0,0,0.32)",letterSpacing:"0.08em",textTransform:"uppercase",whiteSpace:"nowrap"}}>Home Workbook</div>
              <div style={{fontSize:17,fontWeight:800,color:"#1C1C1E",letterSpacing:"-0.3px",whiteSpace:"nowrap"}}>Bill Pay</div>
            </div>
          )}
        </div>

        {/* Nav items */}
        <div style={{flex:1, padding: collapsed ? "4px 6px" : "4px 10px", overflowY:"auto"}}>
          {navItems.map(item => {
            const active = panel === item.id;
            return (
              <button key={item.id} onClick={()=>setPanel(item.id)}
                style={{
                  width:"100%", display:"flex", alignItems:"center",
                  justifyContent: collapsed ? "center" : "flex-start",
                  gap: collapsed ? 0 : 10,
                  padding: collapsed ? "6px 0" : "8px 10px",
                  borderRadius:8, border:"none",
                  background: active ? "rgba(127,88,175,0.12)" : "transparent",
                  cursor:"pointer", fontFamily:"inherit", marginBottom:2,
                  position:"relative"
                }}>
                {/* Icon badge container */}
                <div style={{
                  width:32, height:32, borderRadius:8, flexShrink:0,
                  background: active ? (item.accent||"#7F58AF") : "rgba(0,0,0,0.06)",
                  display:"flex", alignItems:"center", justifyContent:"center",
                  position:"relative", transition:"background 0.15s"
                }}>
                  <NavIcon icon={item.icon} active={active}/>
                  {/* Badge dot on icon when collapsed */}
                  {collapsed && item.badge>0 && (
                    <span style={{position:"absolute",top:-4,right:-4,background:"#E84D8A",color:"#fff",borderRadius:10,padding:"0 4px",fontSize:9,fontWeight:700,lineHeight:"15px",minWidth:15,textAlign:"center"}}>
                      {item.badge}
                    </span>
                  )}
                </div>
                {/* Label + badge when expanded */}
                {!collapsed && (
                  <>
                    <span style={{fontSize:13,fontWeight:active?700:500,color:active?"#1C1C1E":"rgba(0,0,0,0.55)",flex:1,textAlign:"left",whiteSpace:"nowrap"}}>{item.label}</span>
                    {item.badge>0 && <span style={{background:"#E84D8A",color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:700}}>{item.badge}</span>}
                  </>
                )}
              </button>
            );
          })}
        </div>

        {/* User row */}
        <div style={{
          padding: collapsed ? "10px 0 24px" : "12px 12px 24px",
          borderTop:"1px solid rgba(0,0,0,0.07)",
          display:"flex", alignItems:"center",
          justifyContent: collapsed ? "center" : "flex-start",
          gap: collapsed ? 0 : 10, flexShrink:0,
          flexDirection: collapsed ? "column" : "row"
        }}>
          {user?.picture
            ? <img src={user.picture} style={{width:30,height:30,borderRadius:15,flexShrink:0}} alt=""/>
            : <div style={{width:30,height:30,borderRadius:15,background:"#7F58AF",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:700,flexShrink:0}}>{user?.name?.[0]||"?"}</div>
          }
          {!collapsed && (
            <>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:700,color:"#1C1C1E",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user?.name||"User"}</div>
                <div style={{fontSize:10,color:"rgba(0,0,0,0.35)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user?.email||""}</div>
              </div>
              <button onClick={onSignOut} title="Sign out"
                style={{background:"none",border:"none",cursor:"pointer",padding:4,borderRadius:6,flexShrink:0}}>

                </svg>

      {/* ── Main Content ── */}

// ─── Desktop Property App wrapper ─────────────────────────────────────────────
function PropAppDesktop({pk,onNav}){
  const p=PROPERTIES[pk];
  const { months, vendors, synced, error, updateMonth, addMonth, deleteMonth, saveVendors } = useSupabaseData(pk, p.vendors, p.seed);
  const [subScreen,setSubScreen]=useState("home");
  const [activeId,setActiveId]=useState(null);
  const [viewId,setViewId]=useState(null);

  const active=months.filter(m=>m.status!=="closed");
  const closed=months.filter(m=>m.status==="closed");
  const cur=months.find(m=>m.id===activeId);
  const view=months.find(m=>m.id===viewId);

  function startNew(yr,mo){
    const ex=months.find(m=>m.year===yr&&m.month===mo&&m.status!=="closed");
    if(ex){setActiveId(ex.id);setSubScreen("bills");return;}
    const nm={id:uid(),year:yr,month:mo,label:`${MO[mo]} ${yr}`,status:"inprogress",startingBalance:0,balance:0,bills:[],closedAt:null};
    addMonth(nm);setActiveId(nm.id);setSubScreen("bills");
  }

  const goHome=()=>setSubScreen("home");

  if(!synced) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",flexDirection:"column",gap:16}}>
      <div style={{width:40,height:40,border:"3px solid #f0f0f5",borderTop:"3px solid #7F58AF",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <div style={{fontSize:14,color:"rgba(0,0,0,0.4)"}}>Connecting to database…</div>
      {error&&<div style={{fontSize:12,color:"#E84D8A",maxWidth:300,textAlign:"center"}}>{error}</div>}
    </div>
  );

  return(
    <div style={{padding:"0",minHeight:"100vh",background:"#f0f0f5"}}>
      <div style={{padding:"20px 32px 0",display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:13,color:"rgba(0,0,0,0.35)",cursor:"pointer"}} onClick={()=>onNav("dashboard")}>Overview</span>
        <span style={{fontSize:13,color:"rgba(0,0,0,0.25)"}}>›</span>
        <span style={{fontSize:13,fontWeight:600,color:"#1C1C1E"}}>{p.label}</span>
        {subScreen!=="home"&&<><span style={{fontSize:13,color:"rgba(0,0,0,0.25)"}}>›</span><span style={{fontSize:13,fontWeight:600,color:p.accent,cursor:"pointer"}} onClick={goHome}>{subScreen==="bills"?"Pay Bills":subScreen==="manage"?"Vendors":subScreen==="history"?"History":subScreen==="new"?"New Month":subScreen==="schedule"?"Schedule":"View"}</span></>}
      </div>
      <div style={{maxWidth:800,margin:"0 auto",padding:"16px 32px 48px"}}>
        {subScreen==="home"     &&<PropHomeDesktop p={p} active={active} closed={closed} onOpen={id=>{setActiveId(id);setSubScreen("bills");}} onNew={()=>setSubScreen("new")} onManage={()=>setSubScreen("manage")} onHistory={()=>setSubScreen("history")} onDelete={deleteMonth} onSchedule={()=>setSubScreen("schedule")}/>}
        {subScreen==="schedule" &&<BillSchedule p={p} vendors={vendors} months={months} onBack={goHome}/>}
        {subScreen==="new"     &&<NewMonth p={p} months={months} onStart={startNew} onBack={goHome}/>}
        {subScreen==="bills"   &&cur&&<Bills p={p} month={cur} vendors={vendors} onUpdate={updateMonth} onClose={id=>{updateMonth(id,()=>({status:"closed",closedAt:Date.now()}));goHome();}} onBack={goHome}/>}
        {subScreen==="manage"  &&<ManageVendors p={p} vendors={vendors} setVendors={saveVendors} allMonths={months} onBack={goHome}/>}
        {subScreen==="history" &&<History p={p} months={closed} onView={id=>{setViewId(id);setSubScreen("view");}} onBack={goHome}/>}
        {subScreen==="view"    &&view&&<ViewMonth p={p} month={view} onBack={()=>setSubScreen("history")}/>}
      </div>
    </div>
  );
}

// ─── Reminders Widget ────────────────────────────────────────────────────────
function RemindersWidget(){
  const {reminders, dismissReminder, snoozeReminder} = useReminders();
  const [snoozeId,   setSnoozeId]   = useState(null);
  const [snoozeDate, setSnoozeDate] = useState("");

  if(reminders.length === 0) return null;

  const withDue = reminders.map(r=>({...r, due:nextDueDate(r), status:reminderStatus(r)}));
  withDue.sort((a,b)=>a.due-b.due);
  const visible = withDue.filter(r=>r.status.days <= 90);
  if(visible.length === 0) return null;

  const overdueCount = visible.filter(r=>r.status.days < 0).length;

  return(
    <div style={{background:"#fff",borderRadius:16,overflow:"hidden",marginBottom:16,border:"1px solid rgba(0,0,0,0.07)",boxShadow:"0 2px 10px rgba(0,0,0,0.05)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px 10px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:26,height:26,borderRadius:7,background:"linear-gradient(135deg,#FEB326,#E84D8A)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🔔</div>
          <div style={{fontSize:13,fontWeight:700,color:"#1C1C1E"}}>Reminders</div>
        </div>
        {overdueCount > 0 && (

// ─── SVG Chart Components ─────────────────────────────────────────────────────
function SpendingBarChart({ data, currentMonth, currentYear }) {
  const W = 358, H = 120, PAD_L = 42, PAD_B = 24, PAD_R = 8, PAD_T = 8;
  const chartW = W - PAD_L - PAD_R;
  const chartH = H - PAD_T - PAD_B;
  const max = Math.max(...data.map(d => d.spent), 1);
  const barW = Math.floor(chartW / data.length) - 6;
  const gap  = (chartW - barW * data.length) / (data.length + 1);

  // Y axis grid lines at 0, 50%, 100%
  const yTicks = [0, 0.5, 1].map(pct => ({
    y: PAD_T + chartH * (1 - pct),
    label: pct === 0 ? "$0" : pct === 0.5 ? fmt(max/2).replace(".00","") : fmt(max).replace(".00",""),
  }));

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
      {/* Grid lines */}
      {yTicks.map((t,i) => (
        <g key={i}>
          <line x1={PAD_L} y1={t.y} x2={W - PAD_R} y2={t.y}
            stroke="rgba(0,0,0,0.06)" strokeWidth="1" strokeDasharray={i>0?"4 4":""}/>
          <text x={PAD_L - 5} y={t.y + 4} textAnchor="end"
            style={{fontSize:9,fill:"rgba(0,0,0,0.3)",fontFamily:"inherit"}}>{t.label}</text>
        </g>
      ))}

      {/* Bars */}
      {data.map((d, i) => {
        const isCurrent = d.mo === currentMonth && d.yr === currentYear;
        const barH = d.spent > 0 ? Math.max(4, (d.spent / max) * chartH) : 0;
        const x = PAD_L + gap + i * (barW + gap);
        const y = PAD_T + chartH - barH;
        return (
          <g key={i}>
            {/* Bar background */}
            <rect x={x} y={PAD_T} width={barW} height={chartH}
              rx="4" fill="rgba(0,0,0,0.03)"/>
            {/* Bar fill */}
            {d.spent > 0 && (
              <rect x={x} y={y} width={barW} height={barH} rx="4"
                fill={isCurrent ? "#7F58AF" : "rgba(127,88,175,0.25)"}
                style={{transition:"height 0.5s ease, y 0.5s ease"}}/>
            )}
            {/* Amount label on current bar */}
            {isCurrent && d.spent > 0 && (
              <text x={x + barW/2} y={y - 5} textAnchor="middle"
                style={{fontSize:9,fontWeight:"bold",fill:"#7F58AF",fontFamily:"inherit"}}>
                {fmt(d.spent).replace(".00","")}
              </text>
            )}
            {/* Month label */}
            <text x={x + barW/2} y={H - 4} textAnchor="middle"
              style={{fontSize:10,fill:isCurrent?"#7F58AF":"rgba(0,0,0,0.38)",fontWeight:isCurrent?"700":"400",fontFamily:"inherit"}}>
              {d.label}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function SpendingTrendLine({ data }) {
  const W = 358, H = 110, PAD_L = 42, PAD_B = 24, PAD_R = 8, PAD_T = 16;
  const chartW = W - PAD_L - PAD_R;
  const chartH = H - PAD_T - PAD_B;
  const vals = data.map(d => d.spent);
  const max = Math.max(...vals, 1);
  const min = 0;

  const pts = data.map((d, i) => ({
    x: PAD_L + (i / (data.length - 1)) * chartW,
    y: PAD_T + chartH - ((d.spent - min) / (max - min)) * chartH,
    ...d,
  }));

  // Smooth bezier path
  const pathD = pts.reduce((acc, pt, i) => {
    if (i === 0) return `M ${pt.x} ${pt.y}`;
    const prev = pts[i - 1];
    const cpx = (prev.x + pt.x) / 2;
    return `${acc} C ${cpx} ${prev.y} ${cpx} ${pt.y} ${pt.x} ${pt.y}`;
  }, "");

  // Area fill path
  const areaD = `${pathD} L ${pts[pts.length-1].x} ${PAD_T + chartH} L ${pts[0].x} ${PAD_T + chartH} Z`;

  // Y ticks
  const yTicks = [0, 0.5, 1].map(pct => ({
    y: PAD_T + chartH * (1 - pct),
    label: fmt(min + (max - min) * pct).replace(".00",""),
  }));

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
      <defs>
        <linearGradient id="trendGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#7F58AF" stopOpacity="0.18"/>
          <stop offset="100%" stopColor="#7F58AF" stopOpacity="0.02"/>
        </linearGradient>
      </defs>

      {/* Grid lines */}
      {yTicks.map((t,i) => (
        <g key={i}>
          <line x1={PAD_L} y1={t.y} x2={W - PAD_R} y2={t.y}
            stroke="rgba(0,0,0,0.06)" strokeWidth="1" strokeDasharray={i>0?"4 4":""}/>
          <text x={PAD_L - 5} y={t.y + 4} textAnchor="end"
            style={{fontSize:9,fill:"rgba(0,0,0,0.3)",fontFamily:"inherit"}}>{t.label}</text>
        </g>
      ))}

      {/* Area fill */}
      <path d={areaD} fill="url(#trendGrad)"/>

      {/* Trend line */}
      <path d={pathD} fill="none" stroke="#7F58AF" strokeWidth="2.5"
        strokeLinecap="round" strokeLinejoin="round"/>

      {/* Data points */}
      {pts.map((pt, i) => {
        const isLast = i === pts.length - 1;
        const isHigh = pt.spent === Math.max(...vals);
        return (
          <g key={i}>
            <circle cx={pt.x} cy={pt.y} r={isLast ? 5 : 3.5}
              fill={isLast ? "#7F58AF" : "#ffffff"}
              stroke="#7F58AF" strokeWidth={isLast ? 0 : 2}/>
            {(isLast || isHigh) && pt.spent > 0 && (
              <text x={pt.x} y={pt.y - 9} textAnchor="middle"
                style={{fontSize:9,fontWeight:"bold",fill:"#7F58AF",fontFamily:"inherit"}}>
                {fmt(pt.spent).replace(".00","")}
              </text>
            )}
            <text x={pt.x} y={H - 4} textAnchor="middle"
              style={{fontSize:10,fill:isLast?"#7F58AF":"rgba(0,0,0,0.35)",fontWeight:isLast?"700":"400",fontFamily:"inherit"}}>
              {pt.label}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

const MO_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// ─── Dashboard helpers ────────────────────────────────────────────────────────
function calcDashStats(swM, snM) {
  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear  = now.getFullYear();
  const lastMonth = thisMonth === 0 ? 11 : thisMonth - 1;
  const lastYear  = thisMonth === 0 ? thisYear - 1 : thisYear;

  const allMonths = [...swM, ...snM];

  // YTD paid
  const ytd = allMonths.reduce((s,m) => {
    if (m.year !== thisYear) return s;
    return s + m.bills.filter(b=>b.status==="paid").reduce((x,b)=>x+b.amount,0);
  }, 0);

  // This month spending (both properties combined)
  const thisMonthSpend = allMonths.reduce((s,m) => {
    if (m.year !== thisYear || m.month !== thisMonth) return s;
    return s + m.bills.filter(b=>b.status==="paid").reduce((x,b)=>x+b.amount,0);
  }, 0);

  // Last month spending
  const lastMonthSpend = allMonths.reduce((s,m) => {
    if (m.year !== lastYear || m.month !== lastMonth) return s;
    return s + m.bills.filter(b=>b.status==="paid").reduce((x,b)=>x+b.amount,0);
  }, 0);

  const spendDelta = lastMonthSpend > 0 ? ((thisMonthSpend - lastMonthSpend) / lastMonthSpend) * 100 : null;

  // Bills pending across all active months
  const pendingBills = allMonths.flatMap(m =>
    m.status !== "closed" ? m.bills.filter(b=>b.status==="pending") : []
  );

  // Largest expense this month
  const thisMonthBills = allMonths.flatMap(m =>
    (m.year===thisYear && m.month===thisMonth) ? m.bills.filter(b=>b.status==="paid") : []
  );
  const largest = thisMonthBills.reduce((max,b) => b.amount > (max?.amount||0) ? b : max, null);

  // Combined remaining balance from active months
  const totalBalance = allMonths.filter(m=>m.status!=="closed").reduce((s,m)=>s+m.balance,0);

  // Health score: compare balance to pending obligations
  const totalPending = pendingBills.reduce((s,b)=>s+b.amount,0);
  let health = "good"; // green
  if (totalBalance <= 0) health = "low";
  else if (totalBalance < totalPending * 0.5) health = "watch";
  else if (totalBalance < totalPending) health = "fair";

  // Per-property quick stats
  const propStats = (months) => {
    const active = months.filter(m=>m.status!=="closed");
    const pending = active.reduce((s,m)=>s+m.bills.filter(b=>b.status==="pending").length,0);
    const paidAmt = active.reduce((s,m)=>s+m.bills.filter(b=>b.status==="paid").reduce((x,b)=>x+b.amount,0),0);
    const bal     = active.reduce((s,m)=>s+m.balance,0);
    const totalBills = active.reduce((s,m)=>s+m.bills.length,0);
    const paidCount  = active.reduce((s,m)=>s+m.bills.filter(b=>b.status==="paid").length,0);
    const pct = totalBills ? Math.round(paidCount/totalBills*100) : 0;
    const cur = active[0] || null;
    return { pending, paidAmt, bal, pct, cur };
  };

  // Per-month spending history (last 6 months, combined both properties)
  const monthHistory = [];
  for (let i = 5; i >= 0; i--) {
    let mo = thisMonth - i;
    let yr = thisYear;
    if (mo < 0) { mo += 12; yr -= 1; }
    const spent = allMonths.reduce((s,m) => {
      if (m.year !== yr || m.month !== mo) return s;
      return s + m.bills.filter(b=>b.status==="paid").reduce((x,b)=>x+b.amount,0);
    }, 0);
    monthHistory.push({ label: MO_SHORT[mo], mo, yr, spent });
  }

  return { ytd, thisMonthSpend, lastMonthSpend, spendDelta, pendingBills, largest, totalBalance, totalPending, health,
           swStats: propStats(swM), snStats: propStats(snM), monthHistory };
}

function healthConfig(h) {
  if (h==="good")  return { color:"#64C5EB", bg:"rgba(100,197,235,0.12)",  label:"Healthy",    icon:"✓" };
  if (h==="fair")  return { color:"#FEB326", bg:"rgba(254,179,38,0.12)",  label:"Fair",       icon:"~" };
  if (h==="watch") return { color:"#FEB326", bg:"rgba(254,179,38,0.12)",  label:"Watch",      icon:"⚠" };
  return                   { color:"#E84D8A", bg:"rgba(232,77,138,0.1)", label:"Low",        icon:"!" };
}

// ─── Property App Shell ───────────────────────────────────────────────────────
function PropApp({pk,onBack}){
  const p=PROPERTIES[pk];
  const { months, vendors, synced, updateMonth, addMonth, deleteMonth, saveVendors } = useSupabaseData(pk, p.vendors, p.seed);
  const[screen,setScreen]=useState("home");
  const[activeId,setActiveId]=useState(null);
  const[viewId,setViewId]=useState(null);

  const active=months.filter(m=>m.status!=="closed");
  const closed=months.filter(m=>m.status==="closed");
  const cur=months.find(m=>m.id===activeId);
  const view=months.find(m=>m.id===viewId);

  function startNew(yr,mo){
    const ex=months.find(m=>m.year===yr&&m.month===mo&&m.status!=="closed");
    if(ex){setActiveId(ex.id);setScreen("bills");return;}
    const nm={id:uid(),year:yr,month:mo,label:`${MO[mo]} ${yr}`,status:"inprogress",startingBalance:0,balance:0,bills:[],closedAt:null};
    addMonth(nm);setActiveId(nm.id);setScreen("bills");
  }

  if(!synced) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16,background:"#f7f7f7"}}>
      <div style={{width:36,height:36,border:"3px solid #f0f0f5",borderTop:"3px solid #7F58AF",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <div style={{fontSize:14,color:"rgba(0,0,0,0.4)"}}>Syncing…</div>
    </div>
  );

  const go=s=>setScreen(s);
  return(
    <div>
      {screen==="home"     &&<PropHome p={p} active={active} closed={closed} onBack={onBack} onOpen={id=>{setActiveId(id);go("bills");}} onNew={()=>go("new")} onManage={()=>go("manage")} onHistory={()=>go("history")} onDelete={deleteMonth} onSchedule={()=>go("schedule")}/>}
      {screen==="schedule" &&<BillSchedule p={p} vendors={vendors} months={months} onBack={()=>go("home")}/>}
      {screen==="new"     &&<NewMonth p={p} months={months} onStart={startNew} onBack={()=>go("home")}/>}
      {screen==="bills"   &&cur&&<Bills p={p} month={cur} vendors={vendors} onUpdate={updateMonth} onClose={id=>{updateMonth(id,()=>({status:"closed",closedAt:Date.now()}));go("home");}} onBack={()=>go("home")}/>}
      {screen==="manage"  &&<ManageVendors p={p} vendors={vendors} setVendors={saveVendors} allMonths={months} onBack={()=>go("home")}/>}
      {screen==="history" &&<History p={p} months={closed} onView={id=>{setViewId(id);go("view");}} onBack={()=>go("home")}/>}
      {screen==="view"    &&view&&<ViewMonth p={p} month={view} onBack={()=>go("history")}/>}
    </div>
  );
}

// ─── New Month ────────────────────────────────────────────────────────────────
function NewMonth({p,months,onStart,onBack}){
  const[yr,setYr]=useState(new Date().getFullYear());
  const[mo,setMo]=useState(new Date().getMonth());
  const conflict=months.find(m=>m.year===yr&&m.month===mo&&m.status!=="closed");
  return(
    <AppleScreen p={p} title="New Month" onBack={onBack}>
      <div style={{padding:"0 16px"}}>
        <AppleFormGroup>
          <AppleRow label="Year">
            <select style={sel} value={yr} onChange={e=>setYr(+e.target.value)}>{[2025,2026,2027].map(y=><option key={y}>{y}</option>)}</select>
          </AppleRow>
          <AppleRow label="Month" last>
            <select style={sel} value={mo} onChange={e=>setMo(+e.target.value)}>{MO.map((m,i)=><option key={i} value={i}>{m}</option>)}</select>
          </AppleRow>
        </AppleFormGroup>
        {conflict&&<div style={{background:"rgba(255,159,10,0.12)",border:"1px solid rgba(255,159,10,0.3)",borderRadius:12,padding:"12px 14px",marginBottom:16,fontSize:14,color:"#FEB326"}}>⚠ A session for {MO[mo]} {yr} is already in progress.</div>}
        <AppleButton accent={p.accent} onClick={()=>onStart(yr,mo)}>{conflict?"Continue →":"Create Month"}</AppleButton>
      </div>
    </AppleScreen>
  );
}

// ─── Bills ────────────────────────────────────────────────────────────────────
function Bills({p,month,vendors,onUpdate,onClose,onBack}){
  const[tab,setTab]=useState("pay");
  const[editing,setEditing]=useState(null);
  const[editAmt,setEditAmt]=useState("");
  const[editNote,setEditNote]=useState("");
  const[showBal,setShowBal]=useState(false);
  const[newBal,setNewBal]=useState("");
  const[addingBill,setAddingBill]=useState(false);
  const[newVId,setNewVId]=useState("");

  const bills=month.bills;
  const pending=bills.filter(b=>b.status==="pending");
  const paid=bills.filter(b=>b.status==="paid");
  const skipped=bills.filter(b=>b.status==="skipped");
  const paidAmt=paid.reduce((s,b)=>s+b.amount,0);
  const pendAmt=pending.reduce((s,b)=>s+b.amount,0);
  const allDone=bills.length>0&&pending.length===0;

  function startEdit(b){setEditing(b.id);setEditAmt(b.amount||"");setEditNote(b.note||"");}
  function confirmPay(){
    const amt=parseFloat(editAmt)||0;
    const old=bills.find(b=>b.id===editing);
    const prev=old?.status==="paid"?(old?.amount||0):0;
    onUpdate(month.id,m=>({bills:m.bills.map(b=>b.id===editing?{...b,status:"paid",amount:amt,note:editNote,paidAt:Date.now()}:b),balance:m.balance+prev-amt}));
    setEditing(null);
  }
  function skipBill(id){onUpdate(month.id,m=>({bills:m.bills.map(b=>b.id===id?{...b,status:"skipped"}:b)}));}
  function unpay(id){const b=bills.find(x=>x.id===id);onUpdate(month.id,m=>({bills:m.bills.map(x=>x.id===id?{...x,status:"pending"}:x),balance:m.balance+(b?.amount||0)}));}
  function saveBalance(){const bal=parseFloat(newBal)||0;onUpdate(month.id,()=>({startingBalance:bal,balance:bal-paidAmt}));setShowBal(false);}
  function addBill(){const v=vendors.find(x=>x.id===newVId);if(!v)return;onUpdate(month.id,m=>({bills:[...m.bills,{id:uid(),vendorId:v.id,vendorName:v.name,amount:v.defaultAmount||0,status:"pending",account:v.account,dueDate:v.dueDate,note:""}]}));setAddingBill(false);setNewVId("");}

  const catGroups={};
  p.cats.forEach(cat=>{const items=bills.filter(b=>{const v=vendors.find(x=>x.id===b.vendorId);return v?.category===cat;});if(items.length)catGroups[cat]=items;});
  const uncat=bills.filter(b=>!vendors.find(x=>x.id===b.vendorId));
  if(uncat.length)catGroups["Other"]=uncat;

  return(
    <div style={{minHeight:"100vh",background:"#f7f7f7",paddingBottom:48}}>
      {/* Header */}
      <div style={{background:"#f7f7f7",padding:"52px 20px 0",borderBottom:"1px solid rgba(0,0,0,0.07)"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:p.accent,fontSize:16,cursor:"pointer",padding:"0 0 12px",display:"flex",alignItems:"center",gap:6,fontFamily:"inherit",fontWeight:500}}>
          <span style={{fontSize:20,lineHeight:1}}>‹</span> {p.label}
        </button>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",paddingBottom:16}}>
          <div>
            <div style={{fontSize:28,fontWeight:700,color:"#1C1C1E",letterSpacing:"-0.3px"}}>{month.label}</div>
            <div style={{display:"flex",gap:8,marginTop:6,flexWrap:"wrap"}}>
              <Chip color={p.accent} bg={`${p.accent}18`}>{fmt(month.balance)} left</Chip>
              <Chip color="#E84D8A" bg="rgba(255,69,58,0.12)">{fmt(paidAmt)} paid</Chip>
              {pendAmt>0&&<Chip color="#FEB326" bg="rgba(255,159,10,0.12)">{fmt(pendAmt)} due</Chip>}
            </div>
          </div>
          <button onClick={()=>{setNewBal(month.startingBalance||"");setShowBal(true);}}
            style={{background:`${p.accent}18`,border:`1px solid ${p.accent}55`,borderRadius:10,padding:"8px 14px",color:p.accent,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
            {month.startingBalance?fmt(month.startingBalance):"Set Balance"}
          </button>
        </div>
        {/* Segmented Control */}
        <div style={{display:"flex",background:"rgba(0,0,0,0.04)",borderRadius:10,padding:3,marginBottom:0}}>
          {[["pay","Pay Bills"],["all","All Bills"],["summary","Summary"]].map(([t,l])=>(
            <button key={t} onClick={()=>setTab(t)}
              style={{flex:1,padding:"7px 0",borderRadius:8,border:"none",background:tab===t?"#ffffff":"transparent",color:tab===t?"#7F58AF":"rgba(0,0,0,0.4)",fontWeight:tab===t?700:600,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s"}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* Balance Modal */}
      {showBal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",backdropFilter:"blur(20px)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200,padding:"0 0 0"}} onClick={()=>setShowBal(false)}>
          <div style={{background:"#ffffff",borderRadius:"20px 20px 0 0",padding:"20px 20px 40px",width:"100%",maxWidth:430}} onClick={e=>e.stopPropagation()}>
            <div style={{width:36,height:4,background:"rgba(0,0,0,0.15)",borderRadius:2,margin:"0 auto 20px"}}/>
            <div style={{fontSize:20,fontWeight:700,color:"#1C1C1E",marginBottom:20}}>Bank Balance</div>
            <div style={{display:"flex",alignItems:"center",background:"rgba(0,0,0,0.04)",borderRadius:14,padding:"4px 16px",marginBottom:16,border:"1px solid rgba(0,0,0,0.09)"}}>
              <span style={{fontSize:22,color:"rgba(0,0,0,0.28)",marginRight:8,fontWeight:300}}>$</span>
              <input autoFocus type="number" value={newBal} onChange={e=>setNewBal(e.target.value)}
                style={{flex:1,background:"none",border:"none",outline:"none",fontSize:28,fontWeight:700,color:"#1C1C1E",padding:"10px 0",fontFamily:"inherit"}}/>
            </div>
            <AppleButton accent={p.accent} onClick={saveBalance}>Save Balance</AppleButton>
          </div>
        </div>
      )}

      <div style={{padding:"20px 16px 0"}}>
        {/* PAY TAB */}
        {tab==="pay"&&(
          <div>
            {allDone&&(
              <div style={{background:"rgba(48,209,88,0.1)",border:"1px solid rgba(48,209,88,0.3)",borderRadius:16,padding:"16px 18px",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:24}}>🎉</span>
                <div><div style={{fontSize:15,fontWeight:600,color:"#64C5EB"}}>All bills addressed!</div><div style={{fontSize:13,color:"rgba(0,0,0,0.38)",marginTop:2}}>Head to Summary to close the month.</div></div>
              </div>
            )}
            {pending.length>0&&(
              <div style={{marginBottom:24}}>
                <SectionLabel>Pending</SectionLabel>
                <div style={{background:"#ffffff",borderRadius:16,overflow:"hidden"}}>
                  {pending.map((b,i)=>{
                    const vendor=vendors.find(v=>v.id===b.vendorId);
                    const hasUrl=vendor?.url;
                    const hasPhone=vendor?.phone;
                    return(
                    <div key={b.id}>
                      <div className="bill-row" onClick={()=>editing===b.id?setEditing(null):startEdit(b)}
                        style={{display:"flex",alignItems:"center",padding:"14px 16px",borderBottom:i<pending.length-1||editing===b.id?"1px solid rgba(0,0,0,0.06)":"none",cursor:"pointer"}}>
                        <div style={{width:8,height:8,borderRadius:4,background:"#FEB326",marginRight:12,flexShrink:0,marginTop:2}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:15,fontWeight:500,color:"#1C1C1E",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.vendorName}</div>
                          <div style={{fontSize:12,color:"rgba(0,0,0,0.35)",marginTop:1}}>{b.account}{b.dueDate&&b.dueDate!=="—"?` · Due ${b.dueDate}`:""}</div>

function ManageVendors({p, vendors, setVendors, onBack, allMonths}){
  const [adding,   setAdding]  = useState(false);
  const [cat,      setCat]     = useState("All");
  const [selected, setSelected]= useState(null);
  const [editing,  setEditing] = useState(null); // vendor id being edited
  const [editForm, setEditForm]= useState({});
  const [form,     setForm]    = useState({name:"",category:p.cats[0],account:"",defaultAmount:"",dueDate:"",notes:"",url:"",phone:""});

  const filtered = cat==="All" ? vendors : vendors.filter(v=>v.category===cat);

  function add(){
    if(!form.name.trim()) return;
    setVendors(pv=>[...pv,{...form,id:uid(),defaultAmount:0}]);
    setForm({name:"",category:p.cats[0],account:"",defaultAmount:"",dueDate:"",notes:"",url:"",phone:""});
    setAdding(false);
  }

  function startEdit(e, v){
    e.stopPropagation();
    setEditing(v.id);
    setEditForm({name:v.name,category:v.category,account:v.account||"",dueDate:v.dueDate||"",notes:v.notes||"",url:v.url||"",phone:v.phone||""});
  }

  function saveEdit(){
    setVendors(pv=>pv.map(v=>v.id===editing?{...v,...editForm}:v));
    setEditing(null);
  }

  // If a vendor is selected, show its profile
  if(selected){
    const v = vendors.find(x=>x.id===selected);
    if(!v) { setSelected(null); return null; }
    return <VendorProfile p={p} vendor={v} allMonths={allMonths||[]} onBack={()=>setSelected(null)}
      onEdit={()=>{ setSelected(null); setEditing(v.id); setEditForm({name:v.name,category:v.category,account:v.account||"",dueDate:v.dueDate||"",notes:v.notes||"",url:v.url||"",phone:v.phone||""}); }}/>;

                    <div style={{fontSize:12,color:"rgba(0,0,0,0.38)",marginTop:2}}>

const FREQ_LABELS = {once:"One-time", monthly:"Monthly", quarterly:"Quarterly", yearly:"Yearly"};

function nextDueDate(reminder){
  // If snoozed, use that date
  if(reminder.snoozedUntil) return new Date(reminder.snoozedUntil);
  const base = new Date(reminder.startDate);
  const now  = new Date();
  if(reminder.frequency === "once") return base;
  let next = new Date(base);
  while(next <= now){
    if(reminder.frequency==="monthly")   next.setMonth(next.getMonth()+1);
    if(reminder.frequency==="quarterly") next.setMonth(next.getMonth()+3);
    if(reminder.frequency==="yearly")    next.setFullYear(next.getFullYear()+1);
  }
  return next;
}

function reminderStatus(reminder){
  const due  = nextDueDate(reminder);
  const now  = new Date();
  const days = Math.round((due - now) / 86400000);
  if(days < 0)  return {label:"Overdue",    color:"#E84D8A", bg:"rgba(232,77,138,0.1)",  days};
  if(days === 0) return {label:"Due today",  color:"#E84D8A", bg:"rgba(232,77,138,0.1)",  days};
  if(days <= 7)  return {label:`${days}d`,   color:"#FEB326", bg:"rgba(254,179,38,0.12)", days};
  if(days <= 30) return {label:`${days}d`,   color:"#7F58AF", bg:"rgba(127,88,175,0.1)",  days};
  return              {label:`${days}d`,     color:"rgba(0,0,0,0.35)", bg:"rgba(0,0,0,0.05)", days};
}

function useReminders(){
  const [reminders, setReminders] = useStorage("bp_reminders", []);

  function addReminder(vendorId, vendorName, propKey, note, frequency, startDate){
    const r = {id:uid(), vendorId, vendorName, propKey, note, frequency, startDate, createdAt:Date.now(), snoozedUntil:null};
    setReminders(prev=>[...prev, r]);
  }

  function deleteReminder(id){ setReminders(prev=>prev.filter(r=>r.id!==id)); }

  function updateReminder(id, changes){ setReminders(prev=>prev.map(r=>r.id===id?{...r,...changes}:r)); }

  // Dismiss: for recurring, advance startDate to next cycle. For one-time, remove it.
  function dismissReminder(id){
    setReminders(prev=>prev.map(r=>{
      if(r.id !== id) return r;
      if(r.frequency === "once") return null; // filter below
      // Advance startDate to the next due date so the cycle continues from there
      const next = nextDueDate(r);
      return {...r, startDate: next.toISOString().slice(0,10), snoozedUntil: null};
    }).filter(Boolean));
  }

  // Snooze: override next due with a specific date
  function snoozeReminder(id, untilDate){
    setReminders(prev=>prev.map(r=>r.id===id?{...r, snoozedUntil: untilDate}:r));
  }

  return {reminders, addReminder, deleteReminder, updateReminder, dismissReminder, snoozeReminder};
}

        ) : (
          <div style={{background:"#fff",borderRadius:16,overflow:"hidden",border:"1px solid rgba(0,0,0,0.07)",marginBottom:32}}>
            {payments.map((pay,i)=>(

                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:16,fontWeight:700,color:pay.amount===highest&&count>1?"#E84D8A":pay.amount===lowest&&count>1?"#64C5EB":"#1C1C1E"}}>
